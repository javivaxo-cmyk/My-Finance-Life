<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="PagoClaro">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8f1e4"/>
      <stop offset="1" stop-color="#e9d9bf"/>
    </linearGradient>
    <linearGradient id="clay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cb7442"/>
      <stop offset="1" stop-color="#b0542c"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#785a32" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#paper)"/>
  <g stroke="#d9cbb0" stroke-width="3" opacity="0.55" stroke-linecap="round">
    <line x1="100" y1="120" x2="412" y2="120"/>
    <line x1="100" y1="176" x2="412" y2="176"/>
    <line x1="100" y1="336" x2="412" y2="336"/>
    <line x1="100" y1="392" x2="412" y2="392"/>
  </g>
  <circle cx="256" cy="256" r="138" fill="url(#clay)" filter="url(#soft)"/>
  <circle cx="256" cy="256" r="138" fill="none" stroke="#924321" stroke-width="6"/>
  <circle cx="256" cy="256" r="115" fill="none" stroke="#e8af78" stroke-width="4" opacity="0.6"/>
  <text x="256" y="262" text-anchor="middle" dominant-baseline="central"
        font-family="Georgia, 'Times New Roman', serif" font-size="170" font-weight="700" fill="#fbf3e4">$</text>
