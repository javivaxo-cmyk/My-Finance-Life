  </defs>
  <rect width="192" height="192" rx="42" fill="url(#paper)"/>
  <g stroke="#d9cbb0" stroke-width="2" opacity="0.55" stroke-linecap="round">
    <line x1="38" y1="46" x2="154" y2="46"/>
    <line x1="38" y1="66" x2="154" y2="66"/>
    <line x1="38" y1="126" x2="154" y2="126"/>
    <line x1="38" y1="146" x2="154" y2="146"/>
  </g>
  <circle cx="96" cy="96" r="52" fill="url(#clay)" filter="url(#soft)"/>
  <circle cx="96" cy="96" r="52" fill="none" stroke="#924321" stroke-width="2.5"/>
  <circle cx="96" cy="96" r="43" fill="none" stroke="#e8af78" stroke-width="1.6" opacity="0.6"/>
  <text x="96" y="99" text-anchor="middle" dominant-baseline="central"
